<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Macros</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #111318;
    color: #e8eaf0;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 180px;
    min-height: 100vh;
  }

  /* ── top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 18px 0;
  }
  .app-name {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: #e8eaf0;
  }
  .gear-btn {
    background: none;
    border: none;
    color: #555b72;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .gear-btn:hover { color: #e8eaf0; }

  /* ── day strip ── */
  .day-strip {
    display: flex;
    align-items: center;
    margin: 14px 18px 0;
    gap: 6px;
  }
  .day-arrow {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #1c1f2b;
    border: 1px solid #2a2d3a;
    color: #555b72;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .day-arrow:hover:not(:disabled) { color: #e8eaf0; border-color: #444; }
  .day-arrow:disabled { opacity: 0.25; cursor: default; }
  .day-label-wrap { flex: 1; text-align: center; }
  .day-main {
    font-size: 14px;
    font-weight: 600;
    display: block;
  }
  .day-sub {
    font-size: 11px;
    color: #555b72;
    display: block;
    margin-top: 1px;
  }
  .today-pip {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #5eead4;
    margin-left: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  /* ── banner ── */
  .banner {
    margin: 12px 18px 0;
    background: #1e1418;
    border: 1px solid #3d1f28;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 13px;
    color: #f87171;
    display: none;
  }
  .banner a { color: #fbbf24; text-decoration: underline; cursor: pointer; }

  /* ── sync line ── */
  .sync-line {
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 11px;
    color: #555b72;
  }
  .spin {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid #2a2d3a;
    border-top-color: #5eead4;
    animation: spin 0.7s linear infinite;
    display: none;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── calorie summary card ── */
  .summary-card {
    margin: 4px 18px 0;
    background: #1c1f2b;
    border-radius: 14px;
    border: 1px solid #2a2d3a;
    padding: 18px;
    display: flex;
    gap: 18px;
    align-items: center;
  }
  .cal-ring-wrap {
    position: relative;
    width: 96px; height: 96px;
    flex-shrink: 0;
  }
  .cal-ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #232636; stroke-width: 8; }
  .ring-arc {
    fill: none; stroke: #5eead4; stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 263;
    stroke-dashoffset: 263;
    transition: stroke-dashoffset 0.7s ease;
  }
  .ring-arc.over { stroke: #fbbf24; }
  .cal-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .cal-number { font-size: 19px; font-weight: 700; line-height: 1; }
  .cal-unit { font-size: 9px; color: #555b72; letter-spacing: 0.06em; margin-top: 2px; }
  .cal-left { font-size: 9px; color: #5eead4; margin-top: 3px; font-weight: 500; }
  .cal-left.over { color: #fbbf24; }

  .macro-list { flex: 1; display: flex; flex-direction: column; gap: 9px; }
  .macro-row { display: flex; justify-content: space-between; align-items: baseline; }
  .macro-label { font-size: 12px; color: #555b72; }
  .macro-val { font-size: 13px; font-weight: 600; }
  .macro-goal { font-size: 11px; color: #3a3d4d; margin-left: 1px; }

  /* ── bars ── */
  .bars-section {
    margin: 10px 18px 0;
    background: #1c1f2b;
    border: 1px solid #2a2d3a;
    border-radius: 14px;
    padding: 16px 18px;
  }
  .bars-heading {
    font-size: 11px;
    font-weight: 600;
    color: #555b72;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .b-row { margin-bottom: 11px; }
  .b-row:last-child { margin-bottom: 0; }
  .b-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .b-name { font-size: 12px; font-weight: 500; }
  .b-nums { font-size: 11px; color: #555b72; }
  .b-nums strong { color: #e8eaf0; font-weight: 600; }
  .b-track { height: 4px; background: #232636; border-radius: 99px; overflow: hidden; }
  .b-fill { height: 100%; border-radius: 99px; width: 0%; transition: width 0.6s ease; }
  .b-fill.prot { background: #818cf8; }
  .b-fill.carb { background: #fbbf24; }
  .b-fill.fat  { background: #5eead4; }
  .b-fill.fib  { background: #4ade80; }
  .b-fill.over { background: #f87171 !important; }

  /* ── meals list ── */
  .meals-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 18px 18px 10px;
  }
  .meals-heading { font-size: 14px; font-weight: 600; }
  .clear-btn {
    font-size: 12px; color: #555b72;
    background: none; border: none; cursor: pointer; transition: color 0.15s;
  }
  .clear-btn:hover { color: #f87171; }

  .meal-item {
    margin: 0 18px 7px;
    background: #1c1f2b;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 13px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
  .meal-left { flex: 1; min-width: 0; }
  .meal-name { font-size: 14px; font-weight: 500; line-height: 1.3; margin-bottom: 4px; }
  .meal-time { font-size: 11px; color: #555b72; margin-bottom: 7px; }
  .meal-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 99px;
  }
  .chip-cal  { background: rgba(94,234,212,0.1);  color: #5eead4; }
  .chip-prot { background: rgba(129,140,248,0.1); color: #818cf8; }
  .chip-carb { background: rgba(251,191,36,0.1);  color: #fbbf24; }
  .chip-fat  { background: rgba(255,255,255,0.05); color: #555b72; }
  .meal-del {
    background: none; border: none;
    color: #3a3d4d; font-size: 16px;
    cursor: pointer; padding: 0; line-height: 1;
    transition: color 0.15s; flex-shrink: 0;
  }
  .meal-del:hover { color: #f87171; }

  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: #555b72;
    font-size: 14px;
    margin: 0 18px;
  }
  .empty-icon { font-size: 26px; margin-bottom: 8px; }

  /* ── clarify bubble ── */
  .clarify-wrap {
    margin: 0 18px 8px;
    background: #151d24;
    border: 1px solid #1e4040;
    border-radius: 12px;
    padding: 13px 14px;
    animation: fadeUp 0.25s ease;
  }
  .clarify-q { font-size: 13px; font-weight: 500; color: #5eead4; margin-bottom: 10px; line-height: 1.45; }
  .clarify-row { display: flex; gap: 8px; }
  .clarify-in {
    flex: 1;
    background: #1c2530;
    border: 1px solid #2a3a42;
    border-radius: 9px;
    padding: 8px 11px;
    color: #e8eaf0;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .clarify-in:focus { border-color: #5eead4; }
  .clarify-go {
    background: #5eead4;
    color: #0d1117;
    border: none;
    border-radius: 9px;
    padding: 8px 14px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .clarify-skip {
    display: block;
    margin-top: 7px;
    font-size: 11px;
    color: #555b72;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .clarify-skip:hover { color: #e8eaf0; }

  /* ── input dock ── */
  .dock {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 480px;
    padding: 10px 18px 30px;
    background: linear-gradient(to top, #111318 65%, transparent);
  }
  .dock-inner {
    background: #1c1f2b;
    border: 1px solid #2a2d3a;
    border-radius: 16px;
    padding: 12px 14px 10px;
  }
  .dock-photo-preview {
    display: none;
    margin-bottom: 8px;
    position: relative;
  }
  .dock-photo-preview img {
    width: 52px; height: 52px;
    border-radius: 9px;
    object-fit: cover;
    border: 1px solid #2a2d3a;
  }
  .photo-x {
    position: absolute; top: -5px; left: 44px;
    width: 17px; height: 17px;
    border-radius: 50%;
    background: #f87171;
    border: none; color: #fff;
    font-size: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .dock-row { display: flex; align-items: flex-end; gap: 8px; }
  .dock-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #e8eaf0;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    line-height: 1.5;
    min-height: 48px;
    max-height: 120px;
    overflow-y: auto;
  }
  .dock-input::placeholder { color: #3a3d4d; }
  .dock-btns { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .sm-btn {
    width: 33px; height: 33px;
    border-radius: 50%;
    border: 1px solid #2a2d3a;
    background: none;
    color: #555b72;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .sm-btn:hover { color: #e8eaf0; border-color: #444; }
  .sm-btn.on { color: #f87171; border-color: #f87171; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.25);} 50%{box-shadow:0 0 0 5px rgba(248,113,113,0);} }
  .send-btn {
    width: 33px; height: 33px;
    border-radius: 50%;
    border: none;
    background: #5eead4;
    color: #0d1117;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
  .dock-hint { font-size: 11px; color: #3a3d4d; margin-top: 8px; text-align: center; }

  /* ── shimmer ── */
  .shim { background: #232636; border-radius: 5px; color: transparent; animation: shim 1.1s infinite; }
  @keyframes shim { 0%,100%{opacity:0.35;} 50%{opacity:0.7;} }

  /* ── toast ── */
  .toast {
    position: fixed; top: 18px; left: 50%;
    transform: translateX(-50%) translateY(-50px);
    background: #1c1f2b;
    border: 1px solid #2a2d3a;
    border-radius: 10px;
    padding: 9px 16px;
    font-size: 13px; font-weight: 500;
    transition: transform 0.25s ease;
    z-index: 999;
    white-space: nowrap;
    max-width: 88vw;
  }
  .toast.up { transform: translateX(-50%) translateY(0); }
  .toast.ok  { border-color: #1e4040; color: #5eead4; }
  .toast.err { border-color: #3d1f28; color: #f87171; }

  /* ── settings sheet ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); z-index: 300;
    align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: #1c1f2b;
    border-radius: 20px 20px 0 0;
    border: 1px solid #2a2d3a;
    padding: 22px 22px 44px;
    width: 100%; max-width: 480px;
    animation: sheetUp 0.28s ease;
    max-height: 88vh; overflow-y: auto;
  }
  @keyframes sheetUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
  .sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .sheet label { display: block; font-size: 11px; color: #555b72; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 5px; margin-top: 14px; }
  .sheet input {
    width: 100%;
    background: #111318;
    border: 1px solid #2a2d3a;
    border-radius: 9px;
    padding: 10px 13px;
    color: #e8eaf0;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .sheet input:focus { border-color: #5eead4; }
  .sheet-save {
    margin-top: 18px; width: 100%;
    background: #5eead4; color: #0d1117;
    border: none; border-radius: 11px;
    padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .sheet-cancel {
    margin-top: 9px; width: 100%;
    background: none; color: #555b72;
    border: none; padding: 9px; font-size: 14px; cursor: pointer;
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="topbar">
  <span class="app-name">Macros</span>
  <button class="gear-btn" onclick="openSettings()">⚙</button>
</div>

<div class="day-strip">
  <button class="day-arrow" id="prev-btn" onclick="changeDay(-1)">‹</button>
  <div class="day-label-wrap">
    <span class="day-main" id="day-main">Today</span>
    <span class="day-sub" id="day-sub"></span>
  </div>
  <button class="day-arrow" id="next-btn" onclick="changeDay(1)">›</button>
</div>

<div class="banner" id="banner">
  Setup needed — <a onclick="openSettings()">add your API key and Script URL</a>
</div>

<div class="sync-line">
  <div class="spin" id="spin"></div>
  <span id="sync-msg"></span>
</div>

<div class="summary-card">
  <div class="cal-ring-wrap">
    <svg viewBox="0 0 96 96" width="96" height="96">
      <circle class="ring-bg" cx="48" cy="48" r="42"/>
      <circle class="ring-arc" id="ring-arc" cx="48" cy="48" r="42"/>
    </svg>
    <div class="cal-center">
      <div class="cal-number" id="cal-num">0</div>
      <div class="cal-unit">CAL</div>
      <div class="cal-left" id="cal-left">2200 left</div>
    </div>
  </div>
  <div class="macro-list">
    <div class="macro-row"><span class="macro-label">Protein</span><span><span class="macro-val" id="m-prot">0</span><span class="macro-goal">/175g</span></span></div>
    <div class="macro-row"><span class="macro-label">Carbs</span><span><span class="macro-val" id="m-carb">0</span><span class="macro-goal">/200g</span></span></div>
    <div class="macro-row"><span class="macro-label">Fat</span><span><span class="macro-val" id="m-fat">0</span><span class="macro-goal">/65g</span></span></div>
    <div class="macro-row"><span class="macro-label">Fiber</span><span><span class="macro-val" id="m-fib">0</span><span class="macro-goal">/28g</span></span></div>
  </div>
</div>

<div class="bars-section">
  <div class="bars-heading">vs. goals</div>
  <div class="b-row">
    <div class="b-top"><span class="b-name" style="color:#818cf8">Protein</span><span class="b-nums"><strong id="bv-prot">0</strong>/175g</span></div>
    <div class="b-track"><div class="b-fill prot" id="bf-prot"></div></div>
  </div>
  <div class="b-row">
    <div class="b-top"><span class="b-name" style="color:#fbbf24">Carbs</span><span class="b-nums"><strong id="bv-carb">0</strong>/200g</span></div>
    <div class="b-track"><div class="b-fill carb" id="bf-carb"></div></div>
  </div>
  <div class="b-row">
    <div class="b-top"><span class="b-name" style="color:#5eead4">Fat</span><span class="b-nums"><strong id="bv-fat">0</strong>/65g</span></div>
    <div class="b-track"><div class="b-fill fat" id="bf-fat"></div></div>
  </div>
  <div class="b-row">
    <div class="b-top"><span class="b-name" style="color:#4ade80">Fiber</span><span class="b-nums"><strong id="bv-fib">0</strong>/28g</span></div>
    <div class="b-track"><div class="b-fill fib" id="bf-fib"></div></div>
  </div>
</div>

<div class="meals-header">
  <span class="meals-heading">Logged meals</span>
  <button class="clear-btn" onclick="clearDay()">Clear day</button>
</div>
<div id="clarify-area"></div>
<div id="meal-list"></div>

<div class="dock">
  <div class="dock-inner">
    <div class="dock-photo-preview" id="photo-preview">
      <img id="photo-thumb" src="" alt="">
      <button class="photo-x" onclick="clearPhoto()">✕</button>
    </div>
    <div class="dock-row">
      <textarea
        class="dock-input"
        id="main-input"
        placeholder="What did you eat?"
        onkeydown="onKey(event)"
        oninput="grow(this)"
      ></textarea>
      <div class="dock-btns">
        <button class="sm-btn" id="mic-btn" onclick="toggleMic()" title="Voice">🎤</button>
        <label class="sm-btn" title="Photo" style="cursor:pointer">
          📷<input type="file" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(event)">
        </label>
        <button class="send-btn" id="send-btn" onclick="submit()">↑</button>
      </div>
    </div>
    <div class="dock-hint">Type, speak, or snap a photo of your meal</div>
  </div>
</div>

<div class="overlay" id="settings-overlay">
  <div class="sheet">
    <div class="sheet-title">Settings</div>
    <label>Anthropic API Key</label>
    <input type="password" id="s-key" placeholder="sk-ant-...">
    <label>Google Apps Script URL</label>
    <input type="text" id="s-url" placeholder="https://script.google.com/macros/s/...">
    <button class="sheet-save" onclick="saveSettings()">Save</button>
    <button class="sheet-cancel" onclick="closeSettings()">Cancel</button>
  </div>
</div>

<script>
const GOALS = { cal:2200, prot:175, carb:200, fat:65, fib:28 };
const CIRC = 263.9; // 2*PI*42

let meals = [];
let totals = { cal:0, prot:0, carb:0, fat:0, fib:0 };
let currentPhoto = null;
let rec = null, listening = false;
let pending = null;
let viewDate = todayKey();

function todayKey() { return new Date().toISOString().slice(0,10); }
function isToday() { return viewDate === todayKey(); }
function cfg() { return JSON.parse(localStorage.getItem('mcfg')||'{}'); }

function dateFmt(key) {
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y,m-1,d);
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((now-dt)/86400000);
  if(diff===0) return 'Today';
  if(diff===1) return 'Yesterday';
  return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function dateLong(key) {
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}
function sheetDate(key) {
  const [y,m,d]=key.split('-'); return m+'/'+d+'/'+y;
}
function offsetKey(key,n) {
  const [y,m,d]=key.split('-').map(Number);
  return new Date(y,m-1,d+n).toISOString().slice(0,10);
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* sync UI */
function syncing(msg){ document.getElementById('spin').style.display='block'; document.getElementById('sync-msg').textContent=msg||''; document.getElementById('sync-msg').style.color='#555b72'; }
function syncDone(msg,ok){ document.getElementById('spin').style.display='none'; const el=document.getElementById('sync-msg'); el.textContent=msg||''; el.style.color=ok?'#5eead4':'#f87171'; if(msg) setTimeout(()=>{ if(el.textContent===msg) el.textContent=''; },2200); }

/* sheet calls - all GET params */
async function sheetGet(params) {
  const c = cfg();
  if(!c.url) return null;
  const qs = new URLSearchParams(params).toString();
  const r = await fetch(c.url+'?'+qs);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function loadDay() {
  updateNav();
  const c = cfg();
  if(!c.url){ meals=[]; recalc(); renderMeals(); updateUI(); return; }
  syncing('Loading…');
  try {
    const data = await sheetGet({ action:'read', date: viewDate });
    meals = (data.meals||[]).map(m=>({
      rowIndex: m.rowIndex,
      name: String(m.name||''),
      cal: Number(m.calories)||0,
      prot: Number(m.protein)||0,
      carb: Number(m.carbs)||0,
      fat: Number(m.fat)||0,
      fib: Number(m.fiber)||0,
      time: m.time||''
    }));
    recalc(); renderMeals(); updateUI();
    syncDone('Synced','ok');
  } catch(e) {
    syncDone('Could not load sheet');
    meals=[]; recalc(); renderMeals(); updateUI();
  }
}

async function addToSheet(meal) {
  return sheetGet({
    action:'add',
    date: sheetDate(viewDate),
    name: meal.name,
    calories: Math.round(meal.cal),
    protein: Math.round(meal.prot),
    carbs: Math.round(meal.carb),
    fat: Math.round(meal.fat),
    fiber: Math.round(meal.fib)
  });
}

async function deleteFromSheet(rowIndex) {
  if(!rowIndex) return;
  return sheetGet({ action:'delete', rowIndex });
}

/* day nav */
function changeDay(n) {
  const c = offsetKey(viewDate,n);
  if(c>todayKey()) return;
  viewDate=c; clearClarify(); loadDay();
}
function updateNav() {
  const lbl = dateFmt(viewDate);
  document.getElementById('day-main').innerHTML = lbl + (isToday() ? '<span class="today-pip"></span>' : '');
  document.getElementById('day-sub').textContent = dateLong(viewDate);
  document.getElementById('next-btn').disabled = isToday();
  document.getElementById('prev-btn').disabled = false;
}

/* totals */
function recalc() {
  totals={cal:0,prot:0,carb:0,fat:0,fib:0};
  for(const m of meals){totals.cal+=m.cal;totals.prot+=m.prot;totals.carb+=m.carb;totals.fat+=m.fat;totals.fib+=m.fib;}
}
function updateUI() {
  const pct=Math.min(totals.cal/GOALS.cal,1);
  const arc=document.getElementById('ring-arc');
  arc.style.strokeDasharray=CIRC;
  arc.style.strokeDashoffset=CIRC-(CIRC*pct);
  arc.classList.toggle('over',totals.cal>GOALS.cal);
  document.getElementById('cal-num').textContent=Math.round(totals.cal);
  const rem=GOALS.cal-totals.cal;
  const cl=document.getElementById('cal-left');
  cl.textContent=rem>=0?Math.round(rem)+' left':Math.abs(Math.round(rem))+' over';
  cl.className='cal-left'+(rem<0?' over':'');
  document.getElementById('m-prot').textContent=Math.round(totals.prot)+'g';
  document.getElementById('m-carb').textContent=Math.round(totals.carb)+'g';
  document.getElementById('m-fat').textContent=Math.round(totals.fat)+'g';
  document.getElementById('m-fib').textContent=Math.round(totals.fib)+'g';
  function bar(id,val,goal){
    document.getElementById('bf-'+id).style.width=Math.min((val/goal)*100,100)+'%';
    document.getElementById('bf-'+id).classList.toggle('over',val>goal);
    document.getElementById('bv-'+id).textContent=Math.round(val);
  }
  bar('prot',totals.prot,GOALS.prot);
  bar('carb',totals.carb,GOALS.carb);
  bar('fat',totals.fat,GOALS.fat);
  bar('fib',totals.fib,GOALS.fib);
}
function renderMeals() {
  const el=document.getElementById('meal-list');
  if(!meals.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🍽</div>${isToday()?'Nothing logged yet':'No meals on this day'}</div>`;
    return;
  }
  el.innerHTML=meals.map((m,i)=>`
    <div class="meal-item">
      <div class="meal-left">
        <div class="meal-name">${esc(m.name)}</div>
        ${m.time?`<div class="meal-time">${esc(m.time)}</div>`:''}
        <div class="meal-chips">
          <span class="chip chip-cal">${Math.round(m.cal)} cal</span>
          <span class="chip chip-prot">${Math.round(m.prot)}g protein</span>
          <span class="chip chip-carb">${Math.round(m.carb)}g carbs</span>
          <span class="chip chip-fat">${Math.round(m.fat)}g fat</span>
        </div>
      </div>
      <button class="meal-del" onclick="delMeal(${i})">✕</button>
    </div>`).join('');
}

async function delMeal(i) {
  const m=meals[i];
  meals.splice(i,1); recalc(); renderMeals(); updateUI();
  syncing('Removing…');
  try { await deleteFromSheet(m.rowIndex); syncDone('Removed','ok'); }
  catch(e){ syncDone('Sync failed'); }
}

async function clearDay() {
  if(!meals.length) return;
  if(!confirm('Clear all meals for '+dateFmt(viewDate)+'?')) return;
  syncing('Clearing…');
  const copy=[...meals];
  meals=[]; recalc(); renderMeals(); updateUI(); clearClarify();
  try {
    for(const m of copy) if(m.rowIndex) await deleteFromSheet(m.rowIndex);
    syncDone('Cleared','ok');
  } catch(e){ syncDone('Sync failed'); }
}

/* clarify */
function clearClarify(){ pending=null; document.getElementById('clarify-area').innerHTML=''; }
function showClarify(q,text,photo) {
  pending={text,photo};
  document.getElementById('clarify-area').innerHTML=`
    <div class="clarify-wrap">
      <div class="clarify-q">🤔 ${esc(q)}</div>
      <div class="clarify-row">
        <input class="clarify-in" id="cq-in" placeholder="Add details…" onkeydown="if(event.key==='Enter')answerClarify()">
        <button class="clarify-go" onclick="answerClarify()">→</button>
      </div>
      <button class="clarify-skip" onclick="skipClarify()">Log with best estimate</button>
    </div>`;
  setTimeout(()=>document.getElementById('cq-in')?.focus(),80);
}
async function answerClarify(){
  const inp=document.getElementById('cq-in'); if(!inp) return;
  const ans=inp.value.trim(); if(!ans) return;
  const txt=pending.text+'. '+ans, ph=pending.photo;
  clearClarify(); await logMeal(txt,ph,false);
}
async function skipClarify(){
  const txt=pending.text, ph=pending.photo;
  clearClarify(); await logMeal(txt,ph,true);
}

/* submit */
async function submit() {
  const inp=document.getElementById('main-input');
  const text=inp.value.trim();
  if(!text && !currentPhoto) return;
  const c=cfg();
  if(!c.key){ toast('Add your API key in Settings','err'); openSettings(); return; }
  const btn=document.getElementById('send-btn');
  btn.disabled=true; btn.textContent='…';
  const photo=currentPhoto;
  inp.value=''; inp.style.height=''; clearPhoto();
  try {
    const r=await claude(text,photo,c.key,false);
    if(r.needs_clarification) showClarify(r.question,text,photo);
    else await logMeal(text,photo,false,r);
  } catch(e){ toast(e.message||'Something went wrong','err'); }
  btn.disabled=false; btn.textContent='↑';
}

async function logMeal(text,photo,force,pre) {
  const c=cfg();
  const list=document.getElementById('meal-list');
  const ph=document.createElement('div');
  ph.className='meal-item'; ph.style.opacity='0.45';
  ph.innerHTML=`<div class="meal-left"><div class="shim" style="width:50%;height:13px;margin-bottom:9px"> </div><div class="shim" style="width:28%;height:10px"> </div></div>`;
  if(list.querySelector('.empty-state')) list.innerHTML='';
  list.insertBefore(ph,list.firstChild);
  try {
    let m=pre;
    if(!m||m.needs_clarification) m=await claude(text,photo,c.key,true);
    ph.remove();
    const now=new Date();
    const meal={
      name:m.meal_name||text.slice(0,80),
      cal:m.calories||0, prot:m.protein||0,
      carb:m.carbs||0, fat:m.fat||0, fib:m.fiber||0,
      time:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    };
    syncing('Saving…');
    const res=await addToSheet(meal);
    meal.rowIndex=res?.rowIndex||null;
    meals.unshift(meal); recalc(); renderMeals(); updateUI();
    syncDone('Saved','ok');
    toast('Logged!','ok');
  } catch(e){
    ph.remove(); renderMeals();
    toast(e.message||'Error','err'); syncDone('');
  }
}

async function claude(text,photo,key,force) {
  const content=[];
  if(photo) content.push({type:'image',source:{type:'base64',media_type:photo.type,data:photo.data}});
  const prompt=force
    ?`Estimate macros for: "${text}"\nRespond ONLY with JSON:\n{"needs_clarification":false,"meal_name":"","calories":0,"protein":0,"carbs":0,"fat":0,"fiber":0}`
    :`User logged: "${text}"${photo?' (with photo)':''}\n\nIf specific enough, return macros. If too vague (just "sandwich","salad","bowl","food"), ask ONE short clarifying question.\n\nRespond ONLY with JSON:\n{"needs_clarification":false,"meal_name":"","calories":0,"protein":0,"carbs":0,"fat":0,"fiber":0}\nor\n{"needs_clarification":true,"question":""}`;
  content.push({type:'text',text:prompt});
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,messages:[{role:'user',content}]})
  });
  if(!r.ok){const e=await r.json().catch(()=>({})); throw new Error(e.error?.message||'Claude error '+r.status);}
  const d=await r.json();
  const match=(d.content?.[0]?.text||'').match(/\{[\s\S]*\}/);
  if(!match) throw new Error('Could not parse response');
  return JSON.parse(match[0]);
}

/* voice */
function toggleMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){toast('Voice not supported','err');return;}
  if(listening){rec?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR(); rec.continuous=false; rec.interimResults=false; rec.lang='en-US';
  rec.onstart=()=>{listening=true;document.getElementById('mic-btn').classList.add('on');};
  rec.onresult=e=>{const inp=document.getElementById('main-input');inp.value=(inp.value+' '+e.results[0][0].transcript).trim();grow(inp);};
  rec.onerror=()=>toast('Voice error','err');
  rec.onend=()=>{listening=false;document.getElementById('mic-btn').classList.remove('on');};
  rec.start();
}

/* photo */
function onPhoto(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    currentPhoto={data:ev.target.result.split(',')[1],type:f.type};
    document.getElementById('photo-thumb').src=ev.target.result;
    document.getElementById('photo-preview').style.display='block';
  };
  r.readAsDataURL(f); e.target.value='';
}
function clearPhoto(){
  currentPhoto=null;
  document.getElementById('photo-preview').style.display='none';
  document.getElementById('photo-thumb').src='';
}

/* misc */
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}}
function grow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
let tt;
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast up '+(type||'');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('up'),2600);
}
function checkBanner(){
  const c=cfg();
  document.getElementById('banner').style.display=(!c.key||!c.url)?'block':'none';
}
function openSettings(){
  const c=cfg();
  document.getElementById('s-key').value=c.key||'';
  document.getElementById('s-url').value=c.url||'';
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('open');}
function saveSettings(){
  const c={key:document.getElementById('s-key').value.trim(),url:document.getElementById('s-url').value.trim()};
  localStorage.setItem('mcfg',JSON.stringify(c));
  closeSettings(); checkBanner(); toast('Saved','ok'); loadDay();
}

checkBanner();
loadDay();
</script>
