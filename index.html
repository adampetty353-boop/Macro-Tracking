<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Macro Tracker</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #21253a;
    --border: rgba(255,255,255,0.07);
    --text: #f0f2f8;
    --muted: #7a7f96;
    --teal: #2dd4bf;
    --amber: #fbbf24;
    --red: #f87171;
    --green: #4ade80;
    --purple: #818cf8;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 140px;
  }

  /* Header */
  .header {
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-left { flex: 1; }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }

  /* Day nav */
  .day-nav {
    display: flex;
    align-items: center;
    gap: 0;
    margin: 14px 20px 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px;
  }
  .day-nav-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: none;
    background: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .day-nav-btn:hover:not(:disabled) { color: var(--text); background: rgba(255,255,255,0.06); }
  .day-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .day-nav-center {
    flex: 1;
    text-align: center;
  }
  .day-nav-label {
    font-size: 14px;
    font-weight: 600;
    display: block;
  }
  .day-nav-sub {
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }
  .day-today-badge {
    display: inline-block;
    font-size: 10px;
    background: var(--teal-dim, rgba(45,212,191,0.15));
    color: var(--teal);
    padding: 1px 7px;
    border-radius: 99px;
    font-weight: 600;
    margin-left: 6px;
    vertical-align: middle;
  }

  .settings-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .settings-btn:hover { color: var(--text); }

  .api-banner {
    margin: 12px 20px 0;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: #f87171;
    display: none;
  }
  .api-banner a { color: var(--amber); text-decoration: underline; cursor: pointer; }

  /* Calorie ring */
  .ring-card {
    margin: 12px 20px 0;
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 20px 20px 18px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .ring-wrap {
    position: relative;
    flex-shrink: 0;
    width: 100px; height: 100px;
  }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 9; }
  .ring-fill {
    fill: none; stroke: var(--teal); stroke-width: 9;
    stroke-linecap: round;
    stroke-dasharray: 279;
    stroke-dashoffset: 279;
    transition: stroke-dashoffset 0.8s ease;
  }
  .ring-fill.over { stroke: var(--amber); }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-cal { font-size: 20px; font-weight: 700; line-height: 1; }
  .ring-label { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; }
  .ring-remain { font-size: 10px; color: var(--teal); margin-top: 2px; font-weight: 500; }
  .ring-info { flex: 1; }
  .ring-info-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .mini-macro { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .mini-macro:last-child { margin-bottom: 0; }
  .mini-name { font-size: 12px; color: var(--muted); }
  .mini-val { font-size: 13px; font-weight: 600; }
  .mini-goal { font-size: 11px; color: var(--muted); }

  /* Progress bars */
  .bars-card {
    margin: 10px 20px 0;
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px 20px;
  }
  .bars-title { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 14px; }
  .bar-row { margin-bottom: 12px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .bar-name { font-size: 13px; font-weight: 500; }
  .bar-nums { font-size: 12px; color: var(--muted); }
  .bar-nums span { color: var(--text); font-weight: 600; }
  .bar-track { height: 5px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; width: 0%; }
  .bar-fill.protein { background: var(--purple); }
  .bar-fill.carbs   { background: var(--amber); }
  .bar-fill.fat     { background: var(--teal); }
  .bar-fill.fiber   { background: var(--green); }
  .bar-fill.over    { background: var(--red) !important; }

  /* Meals log */
  .log-header {
    margin: 18px 20px 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .log-title { font-size: 15px; font-weight: 700; }
  .log-clear {
    font-size: 12px; color: var(--muted);
    background: none; border: none; cursor: pointer;
    padding: 4px 8px; border-radius: 8px; transition: color 0.2s;
  }
  .log-clear:hover { color: var(--red); }
  .meal-card {
    margin: 0 20px 8px;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .meal-info { flex: 1; min-width: 0; }
  .meal-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
  .meal-time { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .meal-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .meal-tag { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 600; }
  .tag-cal  { background: rgba(45,212,191,0.12);  color: var(--teal); }
  .tag-prot { background: rgba(129,140,248,0.12); color: var(--purple); }
  .tag-carb { background: rgba(251,191,36,0.12);  color: var(--amber); }
  .tag-fat  { background: rgba(255,255,255,0.07); color: var(--muted); }
  .meal-delete {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; line-height: 1;
    padding: 0 2px; flex-shrink: 0; transition: color 0.2s;
  }
  .meal-delete:hover { color: var(--red); }
  .empty-log {
    margin: 0 20px; text-align: center;
    padding: 28px 20px; color: var(--muted); font-size: 14px;
  }
  .empty-log-icon { font-size: 28px; margin-bottom: 8px; }

  /* Clarification bubble */
  .clarify-card {
    margin: 0 20px 8px;
    background: rgba(45,212,191,0.07);
    border: 1px solid rgba(45,212,191,0.2);
    border-radius: 14px;
    padding: 14px 16px;
    animation: slideIn 0.3s ease;
  }
  .clarify-q { font-size: 14px; font-weight: 600; color: var(--teal); margin-bottom: 10px; line-height: 1.4; }
  .clarify-input-row { display: flex; gap: 8px; }
  .clarify-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .clarify-input:focus { border-color: var(--teal); }
  .clarify-send {
    background: var(--teal);
    color: #0f1117;
    border: none;
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .clarify-skip {
    font-size: 11px; color: var(--muted);
    margin-top: 8px; cursor: pointer;
    background: none; border: none; padding: 0;
    display: block;
  }
  .clarify-skip:hover { color: var(--text); }

  /* Input dock */
  .input-dock {
    position: fixed;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    padding: 12px 20px 28px;
  }
  .input-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 11px 14px;
  }
  .input-row { display: flex; align-items: flex-end; gap: 10px; }
  .meal-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 15px; font-family: inherit;
    resize: none; line-height: 1.5; max-height: 90px; min-height: 24px; overflow-y: auto;
  }
  .meal-input::placeholder { color: var(--muted); }
  .input-actions { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border); background: none; color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all 0.2s; flex-shrink: 0;
  }
  .icon-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .icon-btn.listening { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.3);} 50%{box-shadow:0 0 0 6px rgba(248,113,113,0);} }
  .send-btn {
    width: 34px; height: 34px; border-radius: 50%; border: none;
    background: var(--teal); color: #0f1117; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; transition: all 0.2s; font-weight: 700;
  }
  .send-btn:hover { transform: scale(1.07); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .input-hint { font-size: 11px; color: var(--muted); margin-top: 7px; text-align: center; }

  /* Photo preview */
  .photo-preview { margin-bottom: 8px; position: relative; display: none; }
  .photo-preview img { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }
  .photo-remove {
    position: absolute; top: -6px; left: 48px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--red); border: none; color: white;
    font-size: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 18px;
    font-size: 13px; font-weight: 500;
    transition: transform 0.3s ease; z-index: 1000;
    white-space: nowrap; max-width: 90vw; text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error   { border-color: rgba(248,113,113,0.3); color: var(--red); }
  .toast.success { border-color: rgba(45,212,191,0.3);  color: var(--teal); }

  /* Shimmer */
  .shimmer {
    background: rgba(255,255,255,0.06);
    border-radius: 6px; color: transparent;
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:0.4;} 50%{opacity:0.9;} }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 24px 24px 0 0;
    border: 1px solid var(--border); padding: 24px 24px 40px;
    width: 100%; max-width: 480px;
    animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto;
  }
  @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
  .modal label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  .modal input {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; color: var(--text); font-size: 14px;
    font-family: inherit; outline: none;
  }
  .modal input:focus { border-color: var(--teal); }
  .modal-save {
    margin-top: 20px; width: 100%; background: var(--teal); color: #0f1117;
    border: none; border-radius: 12px; padding: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .modal-cancel {
    margin-top: 10px; width: 100%; background: none; color: var(--muted);
    border: none; padding: 10px; font-size: 14px; cursor: pointer;
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
  <div class="header-left">
    <div class="header-title">Macro Tracker</div>
  </div>
  <button class="settings-btn" onclick="openSettings()">⚙ Settings</button>
</div>

<div class="day-nav">
  <button class="day-nav-btn" id="prev-day-btn" onclick="changeDay(-1)">‹</button>
  <div class="day-nav-center">
    <span class="day-nav-label" id="day-nav-label">Today</span>
    <span class="day-nav-sub" id="day-nav-sub"></span>
  </div>
  <button class="day-nav-btn" id="next-day-btn" onclick="changeDay(1)">›</button>
</div>

<div class="api-banner" id="api-banner">
  API key not set. <a onclick="openSettings()">Open settings</a> to add your Anthropic API key.
</div>

<div class="ring-card">
  <div class="ring-wrap">
    <svg viewBox="0 0 100 100" width="100" height="100">
      <circle class="ring-track" cx="50" cy="50" r="44"/>
      <circle class="ring-fill" id="ring-fill" cx="50" cy="50" r="44"/>
    </svg>
    <div class="ring-center">
      <div class="ring-cal" id="ring-cal">0</div>
      <div class="ring-label">CALORIES</div>
      <div class="ring-remain" id="ring-remain">2200 left</div>
    </div>
  </div>
  <div class="ring-info">
    <div class="ring-info-title">Intake</div>
    <div class="mini-macro">
      <span class="mini-name">Protein</span>
      <span><span class="mini-val" id="mini-protein">0</span><span class="mini-goal">/175g</span></span>
    </div>
    <div class="mini-macro">
      <span class="mini-name">Carbs</span>
      <span><span class="mini-val" id="mini-carbs">0</span><span class="mini-goal">/200g</span></span>
    </div>
    <div class="mini-macro">
      <span class="mini-name">Fat</span>
      <span><span class="mini-val" id="mini-fat">0</span><span class="mini-goal">/65g</span></span>
    </div>
    <div class="mini-macro">
      <span class="mini-name">Fiber</span>
      <span><span class="mini-val" id="mini-fiber">0</span><span class="mini-goal">/28g</span></span>
    </div>
  </div>
</div>

<div class="bars-card">
  <div class="bars-title">Progress vs. goals</div>
  <div class="bar-row">
    <div class="bar-header">
      <span class="bar-name" style="color:var(--purple)">Protein</span>
      <span class="bar-nums"><span id="bar-protein-val">0</span>/175g</span>
    </div>
    <div class="bar-track"><div class="bar-fill protein" id="bar-protein"></div></div>
  </div>
  <div class="bar-row">
    <div class="bar-header">
      <span class="bar-name" style="color:var(--amber)">Carbs</span>
      <span class="bar-nums"><span id="bar-carbs-val">0</span>/200g</span>
    </div>
    <div class="bar-track"><div class="bar-fill carbs" id="bar-carbs"></div></div>
  </div>
  <div class="bar-row">
    <div class="bar-header">
      <span class="bar-name" style="color:var(--teal)">Fat</span>
      <span class="bar-nums"><span id="bar-fat-val">0</span>/65g</span>
    </div>
    <div class="bar-track"><div class="bar-fill fat" id="bar-fat"></div></div>
  </div>
  <div class="bar-row">
    <div class="bar-header">
      <span class="bar-name" style="color:var(--green)">Fiber</span>
      <span class="bar-nums"><span id="bar-fiber-val">0</span>/28g</span>
    </div>
    <div class="bar-track"><div class="bar-fill fiber" id="bar-fiber"></div></div>
  </div>
</div>

<div class="log-header">
  <div class="log-title">Meals logged</div>
  <button class="log-clear" onclick="confirmClearDay()">Clear day</button>
</div>
<div id="clarify-area"></div>
<div id="meals-list"></div>

<div class="input-dock">
  <div class="input-card">
    <div class="photo-preview" id="photo-preview">
      <img id="photo-img" src="" alt="">
      <button class="photo-remove" onclick="removePhoto()">✕</button>
    </div>
    <div class="input-row">
      <textarea class="meal-input" id="meal-input"
        placeholder="What did you eat?"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <div class="input-actions">
        <button class="icon-btn" id="mic-btn" onclick="toggleVoice()" title="Voice">🎤</button>
        <label class="icon-btn" title="Photo" style="cursor:pointer">
          📷<input type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
        </label>
        <button class="send-btn" id="send-btn" onclick="submitMeal()">↑</button>
      </div>
    </div>
    <div class="input-hint">Describe your meal — Claude estimates the macros</div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-title">Settings</div>
    <label>Anthropic API Key</label>
    <input type="password" id="s-anthropic-key" placeholder="sk-ant-...">
    <label>Google Apps Script URL</label>
    <input type="text" id="s-gas-url" placeholder="https://script.google.com/macros/s/...">
    <label>Spreadsheet ID</label>
    <input type="text" id="s-sheet-id" placeholder="103A6pGNbcWTKG_TOkY8b9REpHeEq1_2u9Jtt1hBlkR8">
    <button class="modal-save" onclick="saveSettings()">Save settings</button>
    <button class="modal-cancel" onclick="closeSettings()">Cancel</button>
  </div>
</div>

<script>
const GOALS = { cal: 2200, protein: 175, carbs: 200, fat: 65, fiber: 28 };
const DEFAULT_SHEET_ID = '103A6pGNbcWTKG_TOkY8b9REpHeEq1_2u9Jtt1hBlkR8';
const STORAGE_KEY = 'macrotracker_v3';

// circ for r=44: 2*PI*44 ≈ 276.5
const RING_CIRC = 276.5;

let meals = [];
let totals = { cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
let currentPhoto = null;
let recognition = null;
let isListening = false;
let pendingClarify = null; // { originalText, question }
let viewingDate = getTodayKey(); // YYYY-MM-DD

/* ── Date helpers ── */
function getTodayKey() {
  return new Date().toISOString().slice(0, 10);
}
function isToday() {
  return viewingDate === getTodayKey();
}
function formatDateLabel(key) {
  const [y, m, d] = key.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((today - date) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function formatDateSub(key) {
  const [y, m, d] = key.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function offsetDate(key, days) {
  const [y, m, d] = key.split('-').map(Number);
  const date = new Date(y, m - 1, d + days);
  return date.toISOString().slice(0, 10);
}

/* ── Settings ── */
function getSettings() {
  return JSON.parse(localStorage.getItem('macrotracker_settings') || '{}');
}
function checkBanner() {
  const s = getSettings();
  document.getElementById('api-banner').style.display = s.anthropicKey ? 'none' : 'block';
}

/* ── Storage ── */
function loadDay(dateKey) {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  return data[dateKey] || [];
}
function saveDay(dateKey, mealArr) {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  data[dateKey] = mealArr;
  const keys = Object.keys(data).sort();
  while (keys.length > 60) delete data[keys.shift()];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function hasMealsOnDate(key) {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  return (data[key] || []).length > 0;
}

/* ── Day navigation ── */
function changeDay(delta) {
  const candidate = offsetDate(viewingDate, delta);
  if (candidate > getTodayKey()) return;
  viewingDate = candidate;
  clearClarify();
  loadCurrentDay();
}
function loadCurrentDay() {
  meals = loadDay(viewingDate);
  recalcTotals();
  renderMeals();
  updateUI();
  updateDayNav();
  updateInputVisibility();
}
function updateDayNav() {
  const label = formatDateLabel(viewingDate);
  const sub = formatDateSub(viewingDate);
  const isT = isToday();
  document.getElementById('day-nav-label').innerHTML =
    label + (isT ? '<span class="day-today-badge">today</span>' : '');
  document.getElementById('day-nav-sub').textContent = sub;
  document.getElementById('next-day-btn').disabled = isT;

  // Disable prev if no earlier data exists (check up to 60 days back)
  const prev = offsetDate(viewingDate, -1);
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const anyEarlier = Object.keys(data).some(k => k < viewingDate && (data[k]||[]).length > 0);
  document.getElementById('prev-day-btn').disabled = !anyEarlier && !isToday();
}
function updateInputVisibility() {
  // Allow adding to any day
  document.querySelector('.input-dock').style.display = 'block';
}

/* ── Totals & UI ── */
function recalcTotals() {
  totals = { cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
  for (const m of meals) {
    totals.cal     += m.calories || 0;
    totals.protein += m.protein  || 0;
    totals.carbs   += m.carbs    || 0;
    totals.fat     += m.fat      || 0;
    totals.fiber   += m.fiber    || 0;
  }
}
function updateUI() {
  const calPct = Math.min(totals.cal / GOALS.cal, 1);
  const offset = RING_CIRC - (RING_CIRC * calPct);
  const ring = document.getElementById('ring-fill');
  ring.style.strokeDasharray = RING_CIRC;
  ring.style.strokeDashoffset = offset;
  ring.classList.toggle('over', totals.cal > GOALS.cal);

  document.getElementById('ring-cal').textContent = Math.round(totals.cal);
  const remain = GOALS.cal - totals.cal;
  const remEl = document.getElementById('ring-remain');
  if (remain >= 0) { remEl.textContent = Math.round(remain) + ' left'; remEl.style.color = 'var(--teal)'; }
  else { remEl.textContent = Math.abs(Math.round(remain)) + ' over'; remEl.style.color = 'var(--amber)'; }

  document.getElementById('mini-protein').textContent = Math.round(totals.protein) + 'g';
  document.getElementById('mini-carbs').textContent   = Math.round(totals.carbs) + 'g';
  document.getElementById('mini-fat').textContent     = Math.round(totals.fat) + 'g';
  document.getElementById('mini-fiber').textContent   = Math.round(totals.fiber) + 'g';

  function setBar(id, val, goal) {
    const pct = Math.min((val / goal) * 100, 100);
    const el = document.getElementById('bar-' + id);
    el.style.width = pct + '%';
    el.classList.toggle('over', val > goal);
    document.getElementById('bar-' + id + '-val').textContent = Math.round(val);
  }
  setBar('protein', totals.protein, GOALS.protein);
  setBar('carbs',   totals.carbs,   GOALS.carbs);
  setBar('fat',     totals.fat,     GOALS.fat);
  setBar('fiber',   totals.fiber,   GOALS.fiber);
}
function renderMeals() {
  const list = document.getElementById('meals-list');
  if (meals.length === 0) {
    list.innerHTML = '<div class="empty-log"><div class="empty-log-icon">🍽</div>No meals logged' + (isToday() ? ' yet.' : ' on this day.') + '<br>' + (isToday() ? 'Add your first meal below.' : '') + '</div>';
    return;
  }
  list.innerHTML = meals.map((m, i) => `
    <div class="meal-card">
      <div class="meal-info">
        <div class="meal-name">${escHtml(m.name)}</div>
        <div class="meal-time">${m.time}</div>
        <div class="meal-tags">
          <span class="meal-tag tag-cal">${Math.round(m.calories)} cal</span>
          <span class="meal-tag tag-prot">${Math.round(m.protein)}g protein</span>
          <span class="meal-tag tag-carb">${Math.round(m.carbs)}g carbs</span>
          <span class="meal-tag tag-fat">${Math.round(m.fat)}g fat</span>
        </div>
      </div>
      <button class="meal-delete" onclick="deleteMeal(${i})">✕</button>
    </div>
  `).join('');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function deleteMeal(i) {
  meals.splice(i, 1);
  recalcTotals();
  saveDay(viewingDate, meals);
  renderMeals();
  updateUI();
  showToast('Meal removed', 'success');
}
function confirmClearDay() {
  if (meals.length === 0) return;
  if (confirm('Clear all meals for ' + formatDateLabel(viewingDate) + '?')) {
    meals = [];
    recalcTotals();
    saveDay(viewingDate, meals);
    renderMeals();
    updateUI();
    clearClarify();
    showToast('Day cleared', 'success');
  }
}

/* ── Clarification ── */
function clearClarify() {
  pendingClarify = null;
  document.getElementById('clarify-area').innerHTML = '';
}
function showClarify(question, originalText, photo) {
  pendingClarify = { originalText, photo };
  const area = document.getElementById('clarify-area');
  area.innerHTML = `
    <div class="clarify-card" id="clarify-card">
      <div class="clarify-q">🤔 ${escHtml(question)}</div>
      <div class="clarify-input-row">
        <input class="clarify-input" id="clarify-input" placeholder="Add details..." onkeydown="handleClarifyKey(event)">
        <button class="clarify-send" onclick="submitClarify()">→</button>
      </div>
      <button class="clarify-skip" onclick="skipClarify()">Log anyway with best estimate</button>
    </div>
  `;
  setTimeout(() => document.getElementById('clarify-input')?.focus(), 100);
}
function handleClarifyKey(e) {
  if (e.key === 'Enter') submitClarify();
}
async function submitClarify() {
  const input = document.getElementById('clarify-input');
  if (!input) return;
  const answer = input.value.trim();
  if (!answer) return;
  const combined = pendingClarify.originalText + '. ' + answer;
  clearClarify();
  await logMeal(combined, pendingClarify?.photo);
}
async function skipClarify() {
  const orig = pendingClarify.originalText;
  const photo = pendingClarify?.photo;
  clearClarify();
  await logMeal(orig, photo, true);
}

/* ── Submit ── */
async function submitMeal() {
  const input = document.getElementById('meal-input');
  const text = input.value.trim();
  if (!text && !currentPhoto) return;

  const settings = getSettings();
  if (!settings.anthropicKey) {
    showToast('Add your Anthropic API key in Settings', 'error');
    openSettings();
    return;
  }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = '⋯';

  const photo = currentPhoto;
  input.value = '';
  input.style.height = '';
  removePhoto();

  await processInput(text, photo);

  btn.disabled = false;
  btn.textContent = '↑';
}

async function processInput(text, photo) {
  const settings = getSettings();
  // First: ask Claude if it needs clarification
  try {
    const result = await callClaude(text, photo, settings.anthropicKey);

    if (result.needs_clarification) {
      showClarify(result.question, text, photo);
    } else {
      await logMeal(text, photo, false, result);
    }
  } catch (err) {
    showToast(err.message || 'Something went wrong', 'error');
  }
}

async function logMeal(text, photo, skipCheck = false, preResult = null) {
  const settings = getSettings();

  // Show shimmer placeholder
  const list = document.getElementById('meals-list');
  const placeholder = document.createElement('div');
  placeholder.className = 'meal-card';
  placeholder.style.opacity = '0.5';
  placeholder.innerHTML = `<div class="meal-info"><div class="shimmer" style="width:55%;height:14px;margin-bottom:8px"> </div><div class="shimmer" style="width:30%;height:11px"> </div></div>`;
  if (list.querySelector('.empty-log')) list.innerHTML = '';
  list.insertBefore(placeholder, list.firstChild);

  try {
    let macros = preResult;
    if (!macros || macros.needs_clarification) {
      macros = await callClaude(text, photo, settings.anthropicKey, true);
    }

    placeholder.remove();
    const meal = {
      name: macros.meal_name || text.slice(0, 80),
      calories: macros.calories || 0,
      protein:  macros.protein  || 0,
      carbs:    macros.carbs    || 0,
      fat:      macros.fat      || 0,
      fiber:    macros.fiber    || 0,
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    };

    meals.unshift(meal);
    recalcTotals();
    saveDay(viewingDate, meals);
    renderMeals();
    updateUI();

    if (settings.gasUrl) {
      logToSheets(meal, settings).catch(e => console.warn('Sheets:', e));
    }
    showToast('Logged!', 'success');
  } catch (err) {
    placeholder.remove();
    renderMeals();
    showToast(err.message || 'Something went wrong', 'error');
  }
}

async function callClaude(text, photo, apiKey, forceLog = false) {
  const content = [];
  if (photo) {
    content.push({ type: 'image', source: { type: 'base64', media_type: photo.type, data: photo.data } });
  }

  let prompt;
  if (forceLog) {
    prompt = `Estimate the macros for this meal using your best judgment, even if details are vague: "${text}"

Respond with ONLY this JSON (no markdown):
{
  "needs_clarification": false,
  "meal_name": "short name",
  "calories": number,
  "protein": number,
  "carbs": number,
  "fat": number,
  "fiber": number
}`;
  } else {
    prompt = `A user logged this meal: "${text}"${photo ? ' (with a photo)' : ''}

Decide if you have enough information to estimate macros accurately.
- If the description is SPECIFIC enough (e.g. includes protein source, rough quantity, preparation), estimate the macros.
- If it is TOO VAGUE to give a reasonable estimate (e.g. just "sandwich", "salad", "bowl", "food", "lunch"), ask ONE short clarifying question about the most important missing detail (protein source, size, ingredients).

Respond with ONLY this JSON (no markdown, no explanation):

If specific enough:
{
  "needs_clarification": false,
  "meal_name": "short descriptive name",
  "calories": number,
  "protein": number,
  "carbs": number,
  "fat": number,
  "fiber": number
}

If clarification needed:
{
  "needs_clarification": true,
  "question": "your one short question here"
}`;
  }

  content.push({ type: 'text', text: prompt });

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 300,
      messages: [{ role: 'user', content }]
    })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || 'Claude API error (' + resp.status + ')');
  }

  const data = await resp.json();
  const raw = data.content?.[0]?.text || '';
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Could not parse response');
  return JSON.parse(match[0]);
}

async function logToSheets(meal, settings) {
  const [y, m, d] = viewingDate.split('-');
  const dateStr = m + '/' + d + '/' + y;
  await fetch(settings.gasUrl, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      sheetId: settings.sheetId || DEFAULT_SHEET_ID,
      row: [dateStr, meal.name, Math.round(meal.calories), Math.round(meal.protein), Math.round(meal.carbs), Math.round(meal.fat), Math.round(meal.fiber)]
    })
  });
}

/* ── Voice ── */
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Voice not supported in this browser', 'error');
    return;
  }
  if (isListening) { recognition?.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false; recognition.interimResults = false; recognition.lang = 'en-US';
  recognition.onstart = () => { isListening = true; document.getElementById('mic-btn').classList.add('listening'); };
  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    const inp = document.getElementById('meal-input');
    inp.value = (inp.value + ' ' + t).trim();
    autoResize(inp);
  };
  recognition.onerror = () => showToast('Voice error — try again', 'error');
  recognition.onend = () => { isListening = false; document.getElementById('mic-btn').classList.remove('listening'); };
  recognition.start();
}

/* ── Photo ── */
function handlePhoto(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    currentPhoto = { data: ev.target.result.split(',')[1], type: file.type };
    document.getElementById('photo-img').src = ev.target.result;
    document.getElementById('photo-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}
function removePhoto() {
  currentPhoto = null;
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('photo-img').src = '';
}

/* ── Misc ── */
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitMeal(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
function openSettings() {
  const s = getSettings();
  document.getElementById('s-anthropic-key').value = s.anthropicKey || '';
  document.getElementById('s-gas-url').value = s.gasUrl || '';
  document.getElementById('s-sheet-id').value = s.sheetId || DEFAULT_SHEET_ID;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
function saveSettings() {
  const settings = {
    anthropicKey: document.getElementById('s-anthropic-key').value.trim(),
    gasUrl: document.getElementById('s-gas-url').value.trim(),
    sheetId: document.getElementById('s-sheet-id').value.trim() || DEFAULT_SHEET_ID
  };
  localStorage.setItem('macrotracker_settings', JSON.stringify(settings));
  closeSettings(); checkBanner();
  showToast('Settings saved', 'success');
}

/* ── Init ── */
checkBanner();
loadCurrentDay();
</script>
